import com.google.gson.JsonParser
import com.google.gson.JsonPrimitive

plugins {
    id 'net.fabricmc.fabric-loom'
    id "maven-publish"
    id 'com.palantir.git-version'
}

var targetJavaLang = Integer.parseInt(project.java_lang_version)

tasks.named('runClient').configure {
    dependsOn(build)
}

var verStr = (project.findProperty('verStr') ?: versionDetails().gitHash[0..7]).toString()
version = "${project.mod_version}+${verStr}"

allprojects {
    group = project.maven_group

    repositories {
        maven {
            url = uri("https://api.modrinth.com/maven/")
        }
//        maven {
//            name = "stashymane's repo"
//            url = "https://repo.stashy.dev/releases"
//        }
        maven {
            url = "https://artifactory.kow08absty.com/artifactory/fabricmc"
        }
    }
}

base {
    archivesName = project.archives_base_name
}

allprojects {
    apply plugin: 'java'

    java {
        withSourcesJar()
        sourceCompatibility = JavaVersion.toVersion(targetJavaLang)
        targetCompatibility = JavaVersion.toVersion(targetJavaLang)
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.encoding = "UTF-8"
        it.options.release.set(targetJavaLang)
    }

    project.ext['moduleId'] = 'unnamed'
    project.ext['moduleName'] = ''
    project.ext['mod_license'] = project.mod_license
    project.ext['moduleAccessWidener'] = ''

    tasks.withType(ProcessResources).configureEach {
        doFirst {
            var props = [
                    "mod_page",
                    "mod_sources",
                    "mod_issues",
                    "mod_license",
                    "mod_support_lowest_mc"
            ].collectEntries {
                [it, project.properties[it]]
            }

            props.putAll([
                    'moduleId'   : project.ext['moduleId'],
                    'moduleName' : project.ext['moduleName'],
                    'mod_license': project.ext['mod_license'],
                    'version'    : project.version
            ])

            filesMatching("fabric.mod.json") {
                expand props
            }
        }

        doLast {
            fileTree(dir: outputs.files.asPath, include: "**/fabric.mod.json").each { file ->
                var fabricModJson = JsonParser.parseString(file.text).asJsonObject
                if (!project.ext['moduleAccessWidener'].isEmpty()) {
                    fabricModJson.add("accessWidener", new JsonPrimitive(project.ext['moduleAccessWidener']))
                    file.text = fabricModJson.toString()
                }
            }
        }
    }
}

var devLibsPaths = '**/build/devlibs/*-dev.jar'
var libsPaths = '**/build/libs/*.jar'
var sourcesPaths = '**/*-sources.jar'

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

    implementation include("me.lonefelidae16:groominglib:${project.groom_version}")

    // <editor-fold desc="Extra Sounds modules">
    compileOnly include(project(path: 'logics'))
    compileOnly include(project(path: 'versioned:es26.1'))
    // </editor-fold>

    // Sound Categories modules
    compileOnly include(project(path: 'sound-categories'))

    // DevLaunch
    runtimeOnly fileTree(dir: 'logics', exclude: [sourcesPaths], include: [devLibsPaths, libsPaths])
    runtimeOnly fileTree(dir: 'versioned', exclude: [sourcesPaths], include: [devLibsPaths, libsPaths])
    runtimeOnly fileTree(dir: 'sound-categories', exclude: [sourcesPaths], include: [devLibsPaths, libsPaths])
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }

    repositories {
        maven {
            url = "https://repo.stashy.dev"
            credentials {
                username = project.hasProperty("publish_username") ? project.publish_username : ""
                password = project.hasProperty("publish_password") ? project.publish_password : ""
            }
        }
    }
}
